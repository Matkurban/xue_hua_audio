name: xue_hua_audio_example
description: "Demonstrates how to use the xue_hua_audio plugin."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  xue_hua_audio:
    path: ../
  cupertino_icons: ^1.0.8
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
